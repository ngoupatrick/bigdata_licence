name: bigdata_licence

services:

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.9
    container_name: redpanda
    hostname: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      # Address the broker advertises to clients that connect to the Kafka API.
      # Use the internal addresses to connect to the Redpanda brokers'
      # from inside the same Docker network.
      # Use the external addresses to connect to the Redpanda brokers'
      # from outside the Docker network.
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      # Address the broker advertises to clients that connect to the HTTP Proxy.
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      # Redpanda brokers use the RPC API to communicate with each other internally.
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --node-id 0
      # Mode dev-container uses well-known configuration properties for development in containers.
      - --mode dev-container
      # Tells Seastar (the framework Redpanda uses under the hood) to use 1 core on the system.
      - --smp 1              # Utilise un seul cœur CPU      
      - --memory 1G          # Limite à 1 Go de RAM
      - --overprovisioned    # Indique qu'il partage les ressources (indispensable en Docker)
      - --default-log-level=info
      - --set redpanda.cloud_storage_enabled=false # Désactive le Tiered Storage
      - --set redpanda.enable_central_config_binding=true
      - --set redpanda.partition_autobalancing_mode=off # Désactive le Continuous Balancing
      - --set default_topic_replications=1
      - --set default_topic_partitions=1
      - --set storage_min_free_bytes=104857600
      - --set redpanda.log_cleanup_policy=compact,delete # Active la compaction pour tous les topics (utile pour les topics de configuration et d'état de Connect)
      - --set redpanda.log_compaction_interval_ms=600000 # Scan toutes les 10 min
      - --set redpanda.min_cleanable_dirty_ratio=0.2     # Plus agressif (20%)
      - --set redpanda.retention_bytes=1073741824          # Limite la taille totale des logs à 1 Go (pour éviter de remplir le disque)
      - --set redpanda.retention_ms=3600000                 # Limite la rétention à 1 heure (pour éviter de remplir le disque)
      - --set redpanda.segment_size=104857600                # Limite la taille des segments à 100 Mo (pour faciliter les nettoyages)
      - --set redpanda.delete_retention_ms=60000              # Temps de rétention des segments supprimés (1 min)
      - --set redpanda.compacted_log_segment_size=10485760   # Taille des segments pour les topics compacts (10 Mo)
      - --set redpanda.max_compaction_lag_ms=300000           # Temps maximum avant de compacter un segment (5 min)
      - --set redpanda.compaction_throttle_ms=1000              # Délai entre les opérations de compaction (1 sec)
      - --set redpanda.max_message_bytes=10485760                # Taille maximale des messages à 10 Mo (pour éviter les gros messages qui bloquent la compaction)
      - --set redpanda.message_format_version=3.0-IV1               # Version du format de message (pour compatibilité avec les connecteurs modernes)
      - --set redpanda.log_index_size_max_bytes=1048576              # Taille maximale des index à 1 Mo (pour éviter les gros index qui ralentissent la compaction)
      - --set redpanda.log_index_interval_bytes=4096                   # Intervalle entre les entrées d'index (4 Ko)
      - --set redpanda.auto_create_topics_enabled=true # Permet la création automatique des topics (utile pour les tests et les connecteurs qui créent des topics de configuration)
    volumes:
      - redpanda:/var/lib/redpanda/data
      - share_data:/partage
    healthcheck:
      #test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]      
      test: ["CMD-SHELL", "rpk redpanda admin brokers list | grep $(hostname) | grep -q 'true'"]
      interval: 5s # Intervalle entre les tentatives de healthcheck
      timeout: 5s # Durée maximale pour considérer une tentative de healthcheck comme échouée
      retries: 10 # Nombre de tentatives avant de considérer le service comme non sain
      start_period: 5s # Durée d'attente avant de commencer les healthchecks (le temps que le service démarre)
    networks:
      - licence
    ports:
      - 48081:18081
      - 48082:18082
      - 49092:19092
      - 49644:9644
  
  connect:
    build: .
    container_name: connect
    hostname: connect    
    ports:
      - 8183:8083
    volumes:
      - share_data:/partage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://connect:8083/"]
      interval: 10s # Intervalle entre les tentatives de healthcheck
      timeout: 5s # Durée maximale pour considérer une tentative de healthcheck comme échouée
      retries: 10 # Nombre de tentatives avant de considérer le service comme non sain
      start_period: 20s # Durée d'attente avant de commencer les healthchecks (le temps que le service démarre)
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      ADVERTISED_HOST_NAME: connect
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      #KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://redpanda:8081
      #VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://redpanda:8081
      # Limite la mémoire au niveau de Java (Heap)
      KAFKA_HEAP_OPTS: -Xms512M -Xmx1G
      # Désactive les logs inutiles pour économiser du CPU
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
    deploy:
      resources:
        limits:
          memory: 1.5G # Limite stricte au niveau Docker (1.5G)
          cpus: '1.0'  # Limite à 1 cœur CPU
    depends_on:
      redpanda:
        condition: service_healthy # Attend que le healthcheck de 'kafka' passe
    networks:
      - licence

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    container_name: redpanda-console
    hostname: redpanda-console
    networks:
      - licence
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      AUTH_ENABLED: false
    ports:
      - 8200:8080
    volumes:
      - share_data:/partage
      - ./config.yml:/tmp/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://redpanda-console:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      redpanda:
        condition: service_healthy # Attend que le healthcheck de 'kafka' passe
      connect:
        condition: service_healthy # Attend que le healthcheck de 'connect' passe

  # Pour l'Agence 1
  # docker exec -i $(docker compose ps -q mysql-agence1) mysql -u root -pmysql < ./mysql-init/init_mysql.sql
  mysql-agence1:
    image: mysql:8.0
    container_name: mysql-agence1
    hostname: mysql-agence1    
    environment:
      - MYSQL_ROOT_PASSWORD=mysql
      - MYSQL_DATABASE=nanp_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - mysql_agence_un_data:/var/lib/mysql
      - ./my-custom-1.cnf:/etc/mysql/conf.d/my-custom.cnf
      - ./mysql-init/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql:ro
      - share_data:/partage
    networks:
      - licence
    ports:
      - "8887:3306"
    
  # Pour l'Agence 2
  # docker exec -i $(docker compose ps -q mysql-agence2) mysql -u root -pmysql < ./mysql-init/init_mysql.sql
  mysql-agence2:
    image: mysql:8.0
    container_name: mysql-agence2
    hostname: mysql-agence2    
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: nanp_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - mysql_agence_deux_data:/var/lib/mysql
      - ./my-custom-2.cnf:/etc/mysql/conf.d/my-custom.cnf
      - ./mysql-init/init_mysql.sql:/docker-entrypoint-initdb.d/init_mysql.sql:ro
      - share_data:/partage
    networks:
      - licence
    ports:
      - "8886:3306"

  # from this folder
  # docker exec -i $(docker compose ps -q postgres-globale) psql -U user -d global_db < ./postgres-init/init.sql
  postgres-globale:
    image: debezium/postgres:15
    container_name: postgres-globale
    hostname: postgres-globale
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d global_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s 
    environment: 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: global_db    
    volumes: 
      - ./postgres-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - share_data:/partage
      - postgres_globale_data:/var/lib/postgresql/data
    command: >
      postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    ports: 
      - 5836:5432
    networks:
      - licence

  pgadmin:
    image: dpage/pgadmin4:snapshot
    #size: 176MB
    hostname: pgadmin
    container_name: pgadmin
    #user: "${UID}:${GID}" # Utilise vos identifiants Linux actuels
    user: root
    depends_on:
      postgres-globale:
        condition: service_healthy # Attend que le healthcheck de 'postgres' passe
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5030:80"
    volumes:
      #- pgadmin_data:/var/lib/pgadmin
      - /home/patrick/Téléchargements/ressources/postgres_agence/pgadmin:/var/lib/pgadmin
    networks:
      - licence

  # --- AUTOMATISATION (LANCE LE SCRIPT) ---
  setup-automation:
    build:
      context: ./connect
      dockerfile: Dockerfile
    container_name: setup-automation
    hostname: setup-automation
    volumes: 
      - ./scripts/setup_pipeline.sh:/setup_pipeline.sh
      - ./agence-globale-sink-connector.json:/agence-globale-sink-connector.json
      - ./agence-un-source-connector.json:/agence-un-source-connector.json
      - ./agence-deux-source-connector.json:/agence-deux-source-connector.json
      - ./mysql-init/init_mysql.sql:/init_mysql.sql
      - ./postgres-init/init.sql:/init.sql
    depends_on:
      connect:
        condition: service_healthy
      mysql-agence1:
        condition: service_healthy
      mysql-agence2:
        condition: service_healthy
      postgres-globale:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        chmod +x /setup_pipeline.sh
        cd /
        source /setup_pipeline.sh
    networks:
      - licence

  terminal-agence1:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: terminal-agence1
    hostname: terminal-agence1
    restart: always
    healthcheck:
      test: ["CMD", "curl --fail http://localhost:8501/_stcore/health || exit 1"]
      interval: 5s # Intervalle entre les tentatives de healthcheck
      timeout: 5s # Durée maximale pour considérer une tentative de healthcheck comme échouée      retries: 5
      start_period: 5s # Durée d'attente avant de commencer les healthchecks (le temps que le service démarre)
      retries: 10 # Nombre de tentatives avant de considérer le service comme non sain
    environment:
      AGENCE_NAME: Agence1
      DB_HOST: mysql-agence1
    volumes:
      - ./admin:/app
      - share_data:/partage
      - ./admin/.streamlit:/app/.streamlit
    ports:
      - "8502:8501"
    depends_on:
      mysql-agence1:
        condition: service_healthy
    networks:
      - licence

  terminal-agence2:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: terminal-agence2
    hostname: terminal-agence2
    restart: always
    healthcheck:
      test: ["CMD", "curl --fail http://localhost:8501/_stcore/health || exit 1"]
      interval: 5s # Intervalle entre les tentatives de healthcheck
      timeout: 5s # Durée maximale pour considérer une tentative de healthcheck comme échouée      retries: 5
      start_period: 5s # Durée d'attente avant de commencer les healthchecks (le temps que le service démarre)
      retries: 10 # Nombre de tentatives avant de considérer le service comme non sain
    environment:
      AGENCE_NAME: Agence2
      DB_HOST: mysql-agence2
    volumes:
      - ./admin:/app
      - share_data:/partage
      - ./admin/.streamlit:/app/.streamlit
    ports:
      - "8503:8501"
    depends_on:
      mysql-agence2:
        condition: service_healthy
    networks:
      - licence

  app-dashboard:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-dashboard
    hostname: app-dashboard
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      PG_CONN: "postgresql://user:password@postgres-globale:5432/global_db"
    volumes:
      #- ./app:/usr/src/app
      - share_data:/partage
    ports:
      - "3050:3000"
    depends_on:
      postgres-globale:
        condition: service_healthy # Attend que Postgres soit prêt
    networks:
      - licence


  
volumes:
  redpanda:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/redpanda/redpanda
      o: bind
  mysql_agence_un_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/mysql_agence/agence_un
      o: bind
  mysql_agence_deux_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/mysql_agence/agence_deux
      o: bind
  postgres_globale_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/postgres_agence/globale
      o: bind
  #pgadmin_data:
  #  driver: local # Define the driver and options under the volume name
  #  driver_opts:
  #    type: none
  #    device: /home/patrick/Téléchargements/ressources/postgres_agence/pgadmin
  share_data:
    driver: local # Define the driver and options under the volume name
    driver_opts:
      type: none
      device: /home/patrick/Téléchargements/ressources/share_folder
      o: bind

networks:
  licence:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: licence_bridge