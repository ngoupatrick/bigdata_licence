<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Global Big Data Monitor</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; height: 100vh; margin: 0; }
        .dashboard-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); width: 100%; max-width: 900px; margin: auto; }
        .stat-box { border-left: 4px solid #38bdf8; padding-left: 15px; }
        .stat-label { color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; font-weight: 700; }
        .stat-value { font-size: 2.5rem; font-weight: 800; color: #38bdf8; }
        .chart-container { height: 300px; position: relative; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-0">Live Pipeline Monitor</h2>
                    <small class="text-info">Redpanda Console Active • CDC Enabled</small>
                </div>
                <div class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2">STABLE</div>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="stat-box">
                        <div class="stat-label">Total Global (Aujourd'hui)</div>
                        <div id="global-total" class="stat-value">0 €</div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="chart-container">
                        <canvas id="bigDataChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        const ctx = document.getElementById('bigDataChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Agence 1', 'Agence 2'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['rgba(56, 189, 248, 0.8)', 'rgba(251, 191, 36, 0.8)'],
                    borderRadius: 10,
                    borderWidth: 0,
                    barThickness: 50
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#f1f5f9', font: { size: 14, weight: 'bold' } } }
                },
                animation: { duration: 1000, easing: 'easeOutQuart' }
            }
        });

        const socket = io();
        socket.on('updateGraph', (data) => {
            console.log("Données reçues :", data);
            let total = 0;
            
            // Reset des data avant mise à jour
            chart.data.datasets[0].data = [0, 0];

            data.forEach(item => {
                // UPDATE : parseFloat pour convertir les Strings Postgres en Nombres
                const val = parseFloat(item.value) || 0;
                const idx = item.label === 'agence1' ? 0 : 1;
                chart.data.datasets[0].data[idx] = val;
                total += val;
            });

            chart.update();
            document.getElementById('global-total').innerText = total.toLocaleString('fr-FR') + " €";
        });
    </script>
</body>
</html>
