tyrok:
  target: dev-bronze # you can switch to prod
  outputs:
    dev-bronze:
      type: postgres
      host: postgres
      user: postgres_user
      password: postgres
      port: 5432
      dbname: tyrok # or database instead of dbname
      schema: bronze_schema
      threads: 2 #[optional, 1 or more]
      keepalives_idle: 0 # default 0, indicating the system default. See below
      connect_timeout: 10 # default 10 seconds
      retries: 1  # default 1 retry on error/timeout when opening connections
      application_name: dbt-dev-bronze # optional, but recommended for monitoring and debugging
    dev-silver:
      type: postgres
      host: postgres
      user: postgres_user
      password: postgres
      port: 5432
      dbname: tyrok # or database instead of dbname
      schema: silver_schema
      threads: 2 #[optional, 1 or more]
      keepalives_idle: 0 # default 0, indicating the system default. See below
      connect_timeout: 10 # default 10 seconds
      retries: 1  # default 1 retry on error/timeout when opening connections
      application_name: dbt-dev-silver
    dev-gold:
      type: postgres
      host: postgres
      user: postgres_user
      password: postgres
      port: 5432
      dbname: tyrok # or database instead of dbname
      schema: gold_schema
      threads: 2 #[optional, 1 or more]
      keepalives_idle: 0 # default 0, indicating the system default. See below
      connect_timeout: 10 # default 10 seconds
      retries: 1  # default 1 retry on error/timeout when opening connections
      application_name: dbt-dev-gold
    prod-bronze:
      type: postgres
      host: postgres
      user: postgres_user
      password: postgres
      port: 5432
      dbname: tyrok-prod # or database instead of dbname
      schema: bronze_schema
      threads: 2 #[optional, 1 or more]
      keepalives_idle: 0 # default 0, indicating the system default. See below
      connect_timeout: 10 # default 10 seconds
      retries: 1  # default 1 retry on error/timeout when opening connections
      application_name: dbt-prod-bronze
    prod-silver:
      type: postgres
      host: postgres
      user: postgres_user
      password: postgres
      port: 5432
      dbname: tyrok-prod # or database instead of dbname
      schema: silver_schema
      threads: 2 #[optional, 1 or more]
      keepalives_idle: 0 # default 0, indicating the system default. See below
      connect_timeout: 10 # default 10 seconds
      retries: 1  # default 1 retry on error/timeout when opening connections
      application_name: dbt-prod-silver
    prod-gold:
      type: postgres
      host: postgres
      user: postgres_user
